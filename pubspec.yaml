name: smart_meal
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to pub.dev (hi ahmed shenhab).
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# Application version and build number
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  flutter_screenutil: ^5.9.3
  firebase_core: ^3.10.1
  shared_preferences: ^2.4.0
  sqflite: ^2.4.1
  dio: ^5.7.0
  firebase_auth: ^5.4.1
  side_sheet: ^1.0.4
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.17
  fluttertoast: ^8.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cambria
      fonts:
        - asset: assets/fonts/cambria-regular.ttf

    - family: Ranga
      fonts:
        - asset: assets/fonts/Ranga-Bold.ttf

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

    - family: RobotoSerif
      fonts:
        - asset: assets/fonts/Roboto-Serif.ttf

    - family: SofiaSans
      fonts:
        - asset: assets/fonts/SofiaSans-Bold.ttf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Bold.ttf

    - family: SofiaPro
      fonts:
        - asset: assets/fonts/Sofia Pro Regular.ttf
